<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تم نقل الحلقات</title>

  <!-- خط Cairo -->
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#000;
      color:#fff;
      font-family:'Cairo', sans-serif;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    .container{
      text-align:center;
      padding:30px;
    }

    .title{
      font-size:32px;
      font-weight:700;
      margin-bottom:35px;
      line-height:1.8;
    }

    .btn{
      display:inline-block;
      text-decoration:none;
      background:linear-gradient(135deg,#ffffff,#cfcfcf);
      color:#000;
      padding:16px 40px;
      border-radius:18px;
      font-size:22px;
      font-weight:700;
      transition:0.3s ease;
      box-shadow:0 0 25px rgba(255,255,255,0.25);
    }

    .btn:hover{
      transform:scale(1.07);
      box-shadow:0 0 35px rgba(255,255,255,0.45);
    }

    @media (max-width:600px){
      .title{
        font-size:24px;
      }

      .btn{
        font-size:19px;
        padding:14px 30px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="title">
      تم نقل جميع الحلقات إلى الرابط الجديد
    </div>

    <a class="btn" href="https://yousefqyb-lang.github.io/" target="_blank">
      الانتقال إلى الموقع الجديد
    </a>
  </div>

</body>
</html>
